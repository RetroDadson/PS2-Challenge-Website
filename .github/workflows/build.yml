name: CI Build and Test

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/PS2Challenge.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish src/PS2Challenge.Main/PS2Challenge.Main.csproj -c Release -o ./publish --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Upload test binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries
          path: |
            src/PS2Challenge.Backend.Tests/bin/Release/net10.0/**
            src/PS2Challenge.Main.Tests/bin/Release/net10.0/**
            src/PS2Challenge.IntegrationTests/bin/Release/net10.0/**

  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: env.SONAR_TOKEN != '' && steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and analyze
        if: env.SONAR_TOKEN != ''
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"RobinDadswell_PS2-Challenge-Website" /o:"retrodadson" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.token="${{ env.SONAR_TOKEN }}"
          dotnet build src/PS2Challenge.sln --configuration Release
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

      - name: Skip SonarQube (missing SONAR_TOKEN)
        if: env.SONAR_TOKEN == ''
        shell: powershell
        run: Write-Host "SONAR_TOKEN not set. Skipping SonarQube analysis."

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      TEST_POSTGRES_PASSWORD: ${{ github.run_id }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.TEST_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        suite:
          - backend
          - main
          - frontend
          - integration

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download test binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: test-binaries
          path: src

      - name: Run ${{ matrix.suite }} tests
        shell: bash
        run: |
          mkdir -p ./TestResults

          if [[ "${{ matrix.suite }}" == "backend" ]]; then
            MIGRATION_TEST_CONNECTION_STRING="Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=${TEST_POSTGRES_PASSWORD};Pooling=false" \
            dotnet vstest src/PS2Challenge.Backend.Tests/bin/Release/net10.0/PS2Challenge.Backend.Tests.dll \
              --logger:"trx;LogFileName=backend.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "main" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName!~Frontend" \
              --logger:"trx;LogFileName=main.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "frontend" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName~Frontend" \
              --logger:"trx;LogFileName=frontend.trx" \
              --ResultsDirectory:./TestResults
          else
            dotnet vstest src/PS2Challenge.IntegrationTests/bin/Release/net10.0/PS2Challenge.IntegrationTests.dll \
              --logger:"trx;LogFileName=integration.trx" \
              --ResultsDirectory:./TestResults
          fi

      - name: Publish ${{ matrix.suite }} test results
        uses: dorny/test-reporter@d3cb5605561a46347256b466ef836b85076ad522 # v2.5.0
        if: always()
        with:
          name: ${{ matrix.suite }} tests
          path: ./TestResults/${{ matrix.suite }}.trx
          reporter: dotnet-trx
