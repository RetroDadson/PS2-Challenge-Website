name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/PS2Challenge.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish src/PS2Challenge.Main/PS2Challenge.Main.csproj -c Release -o ./publish --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Upload test binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries
          path: |
            src/PS2Challenge.Backend.Tests/bin/Release/net10.0/**
            src/PS2Challenge.Main.Tests/bin/Release/net10.0/**
            src/PS2Challenge.IntegrationTests/bin/Release/net10.0/**

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      TEST_POSTGRES_PASSWORD: ${{ github.run_id }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.TEST_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        suite:
          - backend
          - main
          - frontend
          - integration

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download test binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: test-binaries
          path: src

      - name: Run ${{ matrix.suite }} tests
        shell: bash
        run: |
          mkdir -p ./TestResults

          if [[ "${{ matrix.suite }}" == "backend" ]]; then
            MIGRATION_TEST_CONNECTION_STRING="Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=${TEST_POSTGRES_PASSWORD};Pooling=false" \
            dotnet vstest src/PS2Challenge.Backend.Tests/bin/Release/net10.0/PS2Challenge.Backend.Tests.dll \
              --logger:"trx;LogFileName=backend.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "main" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName!~Frontend" \
              --logger:"trx;LogFileName=main.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "frontend" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName~Frontend" \
              --logger:"trx;LogFileName=frontend.trx" \
              --ResultsDirectory:./TestResults
          else
            dotnet vstest src/PS2Challenge.IntegrationTests/bin/Release/net10.0/PS2Challenge.IntegrationTests.dll \
              --logger:"trx;LogFileName=integration.trx" \
              --ResultsDirectory:./TestResults
          fi

      - name: Publish ${{ matrix.suite }} test results
        uses: dorny/test-reporter@d3cb5605561a46347256b466ef836b85076ad522 # v2.5.0
        if: always()
        with:
          name: ${{ matrix.suite }} tests
          path: ./TestResults/${{ matrix.suite }}.trx
          reporter: dotnet-trx
