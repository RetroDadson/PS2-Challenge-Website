name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Typecheck and Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Tests
    needs:
      - lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Verify system Chrome
        run: google-chrome --version

      - name: End-to-end tests
        timeout-minutes: 20
        run: npm run test:e2e

  build:
    name: Build
    needs:
      - test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Azure artifact
        shell: bash
        run: |
          rm -rf publish
          mkdir -p publish/apps/server publish/apps/client publish/packages/shared
          cp package.json package-lock.json publish/
          cp apps/server/package.json publish/apps/server/
          cp apps/client/package.json publish/apps/client/
          cp packages/shared/package.json publish/packages/shared/
          cp -r apps/server/dist publish/apps/server/dist
          cp -r apps/client/dist publish/apps/client/dist
          cp -r packages/shared/dist publish/packages/shared/dist
          npm ci --omit=dev --workspaces --include-workspace-root --prefix publish

      - name: Upload Node publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: publish

  sonarqube:
    name: Coverage and SonarQube
    needs:
      - lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage reports
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            apps/client/coverage/lcov.info
            apps/server/coverage/lcov.info
            packages/shared/coverage/lcov.info
          if-no-files-found: error

      - name: Skip SonarQube scan
        if: env.SONAR_TOKEN == ''
        run: |
          echo "Skipping SonarQube analysis."
          echo "Required: SONAR_TOKEN secret."

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  trivy:
    name: Trivy Security Scan
    needs:
      - lint
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
