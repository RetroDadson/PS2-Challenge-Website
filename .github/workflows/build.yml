name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript Build and Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Coverage gates
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            apps/client/coverage/lcov.info
            apps/server/coverage/lcov.info
            packages/shared/coverage/lcov.info
          if-no-files-found: error

      - name: Verify system Chrome
        run: google-chrome --version

      - name: End-to-end tests
        timeout-minutes: 20
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Prepare Azure artifact
        shell: bash
        run: |
          rm -rf publish
          mkdir -p publish/apps/server publish/apps/client publish/packages/shared
          cp package.json package-lock.json publish/
          cp apps/server/package.json publish/apps/server/
          cp apps/client/package.json publish/apps/client/
          cp packages/shared/package.json publish/packages/shared/
          cp -r apps/server/dist publish/apps/server/dist
          cp -r apps/client/dist publish/apps/client/dist
          cp -r packages/shared/dist publish/packages/shared/dist
          npm ci --omit=dev --workspaces --include-workspace-root --prefix publish

      - name: Upload Node publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: publish

  sonarqube:
    name: SonarQube
    needs:
      - typescript
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Skip SonarQube
        if: env.SONAR_TOKEN == ''
        run: |
          echo "Skipping SonarQube analysis."
          echo "Required: SONAR_TOKEN secret."

      - name: Download coverage reports
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@v7
        with:
          name: coverage-reports
          path: .

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
