# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - retrodadsonchallenge

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: Upload test binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries
          path: |
            src/PS2Challenge.Backend.Tests/bin/Release/net10.0/**
            src/PS2Challenge.Main.Tests/bin/Release/net10.0/**
            src/PS2Challenge.IntegrationTests/bin/Release/net10.0/**

      - name: dotnet publish
        run: dotnet publish src/PS2Challenge.Main/PS2Challenge.Main.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        suite:
          - backend
          - main
          - frontend
          - integration

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download test binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: test-binaries
          path: src

      - name: Run ${{ matrix.suite }} tests
        shell: bash
        run: |
          mkdir -p ./TestResults

          if [[ "${{ matrix.suite }}" == "backend" ]]; then
            MIGRATION_TEST_CONNECTION_STRING="Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=postgres;Pooling=false" \
            dotnet vstest src/PS2Challenge.Backend.Tests/bin/Release/net10.0/PS2Challenge.Backend.Tests.dll \
              --logger:"trx;LogFileName=backend.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "main" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName!~Frontend" \
              --logger:"trx;LogFileName=main.trx" \
              --ResultsDirectory:./TestResults
          elif [[ "${{ matrix.suite }}" == "frontend" ]]; then
            dotnet vstest src/PS2Challenge.Main.Tests/bin/Release/net10.0/PS2Challenge.Main.Tests.dll \
              --TestCaseFilter:"FullyQualifiedName~Frontend" \
              --logger:"trx;LogFileName=frontend.trx" \
              --ResultsDirectory:./TestResults
          else
            dotnet vstest src/PS2Challenge.IntegrationTests/bin/Release/net10.0/PS2Challenge.IntegrationTests.dll \
              --logger:"trx;LogFileName=integration.trx" \
              --ResultsDirectory:./TestResults
          fi

      - name: Publish ${{ matrix.suite }} test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: ${{ matrix.suite }} tests
          path: ./TestResults/${{ matrix.suite }}.trx
          reporter: dotnet-trx

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - test
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_30B7FC53F3174B04A2793DE2BC7D0F35 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_96A01072E1974D40A7C1E976C9CEB756 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EF4C4F434B07428E812445CDFC335E13 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'retrodadsonchallenge'
          slot-name: 'Production'
          package: .
