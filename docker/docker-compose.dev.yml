# PS2 Challenge - Development Docker Compose
# This compose file includes additional development tools and hot-reload support

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ps2challenge-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ps2challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_GB.UTF-8"
    volumes:
      - ../mounts/dev/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # pgAdmin - Database Management Tool
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ps2challenge-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ps2challenge.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - ../mounts/dev/pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # PS2 Challenge Application (Development)
  # ============================================================================
  ps2challenge-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: build  # Use build stage for development
    container_name: ps2challenge-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
    command: ["dotnet", "watch", "run", "--project", "/src/PS2Challenge.Main/PS2Challenge.Main.csproj", "--no-launch-profile", "--urls", "http://0.0.0.0:5001"]
    environment:
      # Database Configuration
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=ps2challenge;Username=postgres;Password=${DB_PASSWORD:-devpassword};Include Error Detail=true"

      # Twitch OAuth Configuration
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-dev-client-id}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-dev-client-secret}

      # Admin API Key
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}

      # ASP.NET Core Configuration
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      PORT: 5001

      # Logging Configuration
      Logging__LogLevel__Default: Debug
      Logging__LogLevel__Microsoft: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning

      # Azure Application Insights (Optional)
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      APPINSIGHTS_INSTRUMENTATIONKEY: ${APPINSIGHTS_INSTRUMENTATIONKEY:-}

      # Development Settings
      DOTNET_USE_POLLING_FILE_WATCHER: 'true'
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: 'true'
    volumes:
      - ../src:/src:cached  # Mount source code for hot reload
      - ../mounts/dev/nuget-cache:/root/.nuget/packages
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # Seq - Log Aggregation and Analysis
  # ============================================================================
  seq:
    image: datalust/seq:latest
    container_name: ps2challenge-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: 'Y'
    volumes:
      - ../mounts/dev/seq-data:/data
    ports:
      - "5341:80"
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # Redis - Caching (Optional)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ps2challenge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../mounts/dev/redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ps2challenge-dev-network

# ============================================================================
# Networks
# ============================================================================
networks:
  ps2challenge-dev-network:
    driver: bridge
    name: ps2challenge-dev-network

