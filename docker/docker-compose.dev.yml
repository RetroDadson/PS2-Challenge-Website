# PS2 Challenge - Development Docker Compose
# This compose file includes additional development tools and hot-reload support

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ps2challenge-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ps2challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_GB.UTF-8"
    volumes:
      - ../mounts/dev/postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # pgAdmin - Database Management Tool
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ps2challenge-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ps2challenge.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - ../mounts/dev/pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - ps2challenge-dev-network

  # ============================================================================
  # PS2 Challenge Application (Development)
  # ============================================================================
  ps2challenge-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: build
    container_name: ps2challenge-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
    command: ["npm", "run", "dev", "-w", "@ps2-challenge/server"]
    environment:
      # Database Configuration
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=ps2challenge;Username=postgres;Password=${DB_PASSWORD:-devpassword};Include Error Detail=true"

      # Twitch OAuth Configuration
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-dev-client-id}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-dev-client-secret}

      # Admin API Key
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}

      # Node/Fastify Configuration
      NODE_ENV: Development
      PORT: 5001
      PUBLIC_BASE_URL: http://localhost:5001

      # Logging Configuration
      LOG_LEVEL: debug

      # Azure Application Insights (Optional)
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      APPINSIGHTS_INSTRUMENTATIONKEY: ${APPINSIGHTS_INSTRUMENTATIONKEY:-}

      # Development Settings
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ..:/app:cached
      - /app/node_modules
    networks:
      - ps2challenge-dev-network

# ============================================================================
# Networks
# ============================================================================
networks:
  ps2challenge-dev-network:
    driver: bridge
    name: ps2challenge-dev-network

